general {
    lock_cmd = pidof hyprlock || hyprlock       # Command to lock the screen
    before_sleep_cmd = loginctl lock-session    # Action before system suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # Action after waking up
}

listener {
    timeout = 150                                # 2.5 minutes
    on-timeout = brightnessctl -s set 10         # Dim laptop backlight
    on-resume = brightnessctl -r                # Restore backlight on activity
}

listener {
    timeout = 300                                # 5 minutes
    on-timeout = loginctl lock-session           # Lock screen
}

listener {
    timeout = 600                                # 10 minutes
    on-timeout = hyprctl dispatch dpms off       # Turn off display
    on-resume = hyprctl dispatch dpms on        # Turn on display on activity
}
